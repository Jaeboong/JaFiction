# Jasojeon hosted deployment — single-node Compose stack.
#
# Usage:
#   docker compose --env-file .env.production up -d --build
#
# Only the nginx service publishes host ports. Everything else is internal on
# the implicit default network.

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - jasojeon_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - jasojeon_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: packages/backend/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: "4000"
      DATABASE_URL: "postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}"
      REDIS_URL: redis://redis:6379
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL}
      COOKIE_SECRET: ${COOKIE_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
    expose:
      - "4000"

  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # certbot HTTP-01 webroot (Stage B).
      - /var/www/certbot:/var/www/certbot
      # Let's Encrypt certs issued on the host (Stage B).
      - /etc/letsencrypt:/etc/letsencrypt:ro

volumes:
  jasojeon_pg_data:
    name: jasojeon_pg_data
  jasojeon_redis_data:
    name: jasojeon_redis_data
