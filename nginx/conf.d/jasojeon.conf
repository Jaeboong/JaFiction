# Jasojeon edge config.
#
# Primary domain: 자소전.com (xn--9l4b13i8j.com)
# jaeboong.shop kept as redirect-only alias.
#
# The :80 block keeps /.well-known/acme-challenge/ on plain HTTP for renewals
# and redirects everything else to HTTPS.

# WebSocket upgrade map — must live at http{} scope. nginx:alpine's main
# nginx.conf includes conf.d/*.conf inside http{}, so defining it here is fine.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# ---------- HTTP :80 ----------
server {
    listen 80 default_server;
    listen [::]:80 default_server;

    server_name xn--9l4b13i8j.com www.xn--9l4b13i8j.com
                jaeboong.shop www.jaeboong.shop
                localhost _;

    # Let's Encrypt HTTP-01 challenge — must stay plain HTTP for renewals.
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
        try_files $uri =404;
    }

    # Everything else: redirect to HTTPS.
    location / {
        return 301 https://$host$request_uri;
    }
}

# ---------- HTTPS :443 — 자소전.com (primary) ----------
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;

    server_name xn--9l4b13i8j.com www.xn--9l4b13i8j.com;

    ssl_certificate     /etc/letsencrypt/live/xn--9l4b13i8j.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/xn--9l4b13i8j.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    client_max_body_size 25M;

    # Defence-in-depth security headers (Fastify Helmet is the primary source).
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options           "DENY"     always;
    add_header X-Content-Type-Options    "nosniff"  always;
    add_header Referrer-Policy           "same-origin" always;

    # Fastify backend (REST + OAuth + RPC dispatch).
    location /api/ {
        proxy_pass http://backend:4000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Google OAuth start + callback live at /auth/* on the Fastify backend
    # (not under /api/). Proxy them so the browser login flow works.
    location /auth/ {
        proxy_pass http://backend:4000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Browser-facing event stream.
    location /ws/events {
        proxy_pass http://backend:4000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $connection_upgrade;
        proxy_read_timeout 1h;
        proxy_send_timeout 1h;
    }

    # Runner outbound WS (hosted-mode runners dial in to this path).
    location /runner/ws {
        proxy_pass http://backend:4000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $connection_upgrade;
        proxy_read_timeout 1h;
        proxy_send_timeout 1h;
    }

    # Health check (kept outside /api/ so uptime probes can hit it cheaply).
    location = /healthz {
        proxy_pass http://backend:4000/healthz;
        proxy_set_header Host $host;
    }

    # SPA fallback — React Router client-side routes resolve to index.html.
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }
}

# ---------- HTTPS :443 — jaeboong.shop (alias → 자소전.com 리다이렉트) ----------
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;

    server_name jaeboong.shop www.jaeboong.shop;

    ssl_certificate     /etc/letsencrypt/live/jaeboong.shop/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/jaeboong.shop/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    return 301 https://xn--9l4b13i8j.com$request_uri;
}
