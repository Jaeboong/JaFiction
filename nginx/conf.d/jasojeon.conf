# Jasojeon edge config.
#
# Stage A (current): serves HTTP only so internal smoke tests (curl
# http://localhost/healthz) work before TLS is provisioned.
#
# Stage B: after certbot issues a cert for xn--2t1b49b33i.com, uncomment the
# HTTPS server block at the bottom of this file AND the HTTPS redirect inside
# the HTTP server, then reload nginx.

# WebSocket upgrade map — must live at http{} scope. nginx:alpine's main
# nginx.conf includes conf.d/*.conf inside http{}, so defining it here is fine.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# ---------- HTTP :80 ----------
server {
    listen 80 default_server;
    listen [::]:80 default_server;

    # UTF-8 server_name: lists both the punycode and the Hangul form so either
    # Host header hits this block. nginx treats server_name as opaque bytes; the
    # browser already sends punycode in the Host header for IDN domains, but we
    # keep the Hangul form for documentation / manual curl tests.
    server_name xn--2t1b49b33i.com 자소전.com localhost _;

    # Let's Encrypt HTTP-01 challenge — must stay plain HTTP even after Stage B.
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
        try_files $uri =404;
    }

    # Stage A: serve content over HTTP directly so we can smoke-test without
    # a cert. Stage B: replace the body of this server block with the redirect
    # below and move the `location` blocks down into the :443 server.
    #
    #   return 301 https://$host$request_uri;
    #

    client_max_body_size 25M;

    # Defence-in-depth security headers (Fastify Helmet is the primary source).
    add_header X-Frame-Options        "DENY"     always;
    add_header X-Content-Type-Options "nosniff"  always;
    add_header Referrer-Policy        "same-origin" always;

    # Fastify backend (REST + OAuth + RPC dispatch).
    location /api/ {
        proxy_pass http://backend:4000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Browser-facing event stream.
    location /ws/events {
        proxy_pass http://backend:4000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $connection_upgrade;
        proxy_read_timeout 1h;
        proxy_send_timeout 1h;
    }

    # Runner outbound WS (hosted-mode runners dial in to this path).
    location /runner/ws {
        proxy_pass http://backend:4000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $connection_upgrade;
        proxy_read_timeout 1h;
        proxy_send_timeout 1h;
    }

    # Health check (kept outside /api/ so uptime probes can hit it cheaply).
    location = /healthz {
        proxy_pass http://backend:4000/healthz;
        proxy_set_header Host $host;
    }

    # SPA fallback — React Router client-side routes resolve to index.html.
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }
}

