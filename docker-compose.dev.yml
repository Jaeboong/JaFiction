# Jasojeon dev infrastructure compose (Stage 11.6)
#
# Brings up Postgres + Redis + backend. Web and runner stay on the host.
# Backend is containerized to sidestep Windows bash/drizzle-kit issues.

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: jasojeon
      POSTGRES_USER: jasojeon
      POSTGRES_PASSWORD: devpass
    ports:
      - "5433:5432"
    volumes:
      - jasojeon_dev_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6380:6379"
    volumes:
      - jasojeon_dev_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: packages/backend/Dockerfile
      args:
        BUILD_RUNNER_BIN: "false"
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - packages/backend/.env.dev
    environment:
      # 주의: docker-compose 는 `environment` > `env_file` 우선.
      # 아래 키들은 container-internal 이라 env_file 과 값이 같거나 override 용.
      # PUBLIC_BASE_URL / WEB_BASE_URL / GOOGLE_CLIENT_* 은 env_file 에 맡긴다
      # (로컬: localhost, 서버: xn--9l4b13i8j.shop).
      NODE_ENV: development
      PORT: "4000"
      DATABASE_URL: postgres://jasojeon:devpass@postgres:5432/jasojeon
      REDIS_URL: redis://redis:6379
    ports:
      - "4000:4000"
    volumes:
      - ./packages/runner/dist-bin:/app/packages/runner/dist-bin:ro

volumes:
  jasojeon_dev_pg:
    name: jasojeon_dev_pg
  jasojeon_dev_redis:
    name: jasojeon_dev_redis
